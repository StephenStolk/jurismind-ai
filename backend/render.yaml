services:
  - type: web
    name: jurismind-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: jurismind-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: openai/gpt-oss-120b:free
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_db
      - key: UPLOAD_DIR
        value: /tmp/uploads

  - type: worker
    name: jurismind-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: jurismind-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: openai/gpt-oss-120b:free
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_db
      - key: UPLOAD_DIR
        value: /tmp/uploads

  - type: redis
    name: jurismind-redis
    plan: free
    ipAllowList: []